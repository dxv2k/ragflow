# -----------------------------------------------------------------------------
# Docker Compose for RAGFlow with MonkeyOCR (GPU-enabled)
# Uses Dockerfile.monkeyocr-complete (production-ready with full RAGFlow features)
# Based on official docker-compose.yml and docker-compose-gpu.yml patterns
# -----------------------------------------------------------------------------

include:
  - ./docker-compose-base.yml

services:
  ragflow:
    depends_on:
      mysql:
        condition: service_healthy
      # minio:
      #   condition: service_healthy
    build:
      context: ../
      dockerfile: Dockerfile.monkeyocr
    platform: linux/amd64
    # Example configuration to set up an MCP server:
    command:
      - --enable-mcpserver
      - --mcp-host=0.0.0.0
      - --mcp-port=9383
      - --mcp-base-url=http://127.0.0.1:9380
      - --mcp-script-path=/ragflow/mcp/server/server.py
      # MCP server defaults: --mode=host --no-transport-streamable-http-enabled
      # For self-host mode, uncomment below:
      - --mcp-mode=host
      - --mcp-host-api-key=ragflow-ljMjA5MDUwM2QzMzExZjA4MmNmMDI0Mm
    container_name: ragflow-server
    ports:
      - ${SVR_HTTP_PORT}:9380
      - 81:81
      - 28866:81
      - 443:443
      - 5678:5678
      - 5679:5679
      - 9383:9383 # entry for MCP (host_port:docker_port). The docker_port must match the value you set for `mcp-port` above.
    volumes:
      - ../api:/ragflow/api
      - ../models:/ragflow/models
      - ../whisperx_backend:/ragflow/whisperx_backend
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../history_data_agent:/ragflow/history_data_agent
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
      # MonkeyOCR specific volumes
      - monkeyocr_models:/ragflow/monkeyocr/model_weight
      - monkeyocr_cache:/ragflow/monkeyocr/cache
      - ../mcp:/ragflow/mcp

    env_file: .env
    environment:
      - TZ=${TIMEZONE}
      - HF_ENDPOINT=${HF_ENDPOINT}
      - MACOS=${MACOS}
      - RAGFLOW_MCP_ROOT_PATH=/mcp
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY}
      - RAGFLOW_BASE_URL=${RAGFLOW_BASE_URL}
      # MonkeyOCR specific environment variables
      - MONKEYOCR_API_URL=${MONKEYOCR_API_URL}
      - MONKEYOCR_MODEL_NAME=${MONKEYOCR_MODEL_NAME}
      - MONKEYOCR_API_KEY=${MONKEYOCR_API_KEY}
      - MONKEYOCR_ENABLED=true
      - MONKEYOCR_CONFIG_PATH=/ragflow/conf/monkey_ocr_config.json
      - MONKEYOCR_MODEL_PATH=/ragflow/monkeyocr/model_weight/Recognition
      - MONKEYOCR_CACHE_DIR=/ragflow/monkeyocr/cache
      - HF_HUB_CACHE=/ragflow/monkeyocr/model_weight
      - MINIO_PUBLIC_BASE_URL=https://kb.viact.net:28866
      - MINIO_PUBLIC_PATH_PREFIX=/storage
    networks:
      - ragflow
    restart: on-failure
    # https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # If you use Docker Desktop, the --add-host flag is optional. This flag ensures that the host's internal IP is exposed to the Prometheus container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # GPU configuration (from docker-compose-gpu.yml pattern)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]


# MonkeyOCR specific volumes
volumes:
  monkeyocr_models:
    driver: local
  monkeyocr_cache:
    driver: local