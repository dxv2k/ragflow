version: '3.8'

services:
  # Elasticsearch for vector storage
  es01:
    container_name: ragflow-es-01
    image: elasticsearch:8.11.0
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=ragflow123
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
      - TZ=UTC
    mem_limit: 2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - ragflow
    restart: on-failure

  # Redis for caching and queues
  redis:
    container_name: ragflow-redis
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragflow
    restart: on-failure

  # MySQL database
  mysql:
    container_name: ragflow-mysql
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ragflow123
      MYSQL_DATABASE: ragflow
      MYSQL_USER: ragflow
      MYSQL_PASSWORD: ragflow123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragflow
    restart: on-failure

  # RAGFlow with MonkeyOCR
  ragflow:
    container_name: ragflow-app
    build:
      context: .
      dockerfile: Dockerfile.monkeyocr
    ports:
      - "9380:9380"
    environment:
      - DATABASE_TYPE=mysql
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_NAME=ragflow
      - DATABASE_USER=ragflow
      - DATABASE_PASSWORD=ragflow123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOST=es01
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=ragflow123
      - MONKEYOCR_ENABLED=true
      - MONKEYOCR_CONFIG_PATH=/app/conf/monkey_ocr_config.json
      - MONKEYOCR_MODEL_PATH=/app/monkeyocr/model_weight
      - MONKEYOCR_CACHE_DIR=/app/monkeyocr/cache
      - TZ=UTC
    volumes:
      - ./conf:/app/conf
      - ./logs:/app/logs
      - ./data:/app/data
      - ./cache:/app/cache
      - ./monkeyocr:/app/monkeyocr
      - monkeyocr_models:/app/monkeyocr/model_weight
      - monkeyocr_cache:/app/monkeyocr/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      es01:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9380/api/v1/monkeyocr/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ragflow
    restart: on-failure

  # Nginx reverse proxy
  nginx:
    container_name: ragflow-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
    depends_on:
      - ragflow
    networks:
      - ragflow
    restart: on-failure

volumes:
  esdata01:
    driver: local
  redis_data:
    driver: local
  mysql_data:
    driver: local
  monkeyocr_models:
    driver: local
  monkeyocr_cache:
    driver: local

networks:
  ragflow:
    driver: bridge 